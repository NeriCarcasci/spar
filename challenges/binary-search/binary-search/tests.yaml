tests:
  - input: { nums: [-1, 0, 3, 5, 9, 12], target: 9 }
    expected: 4
    visible: true
  - input: { nums: [-1, 0, 3, 5, 9, 12], target: 2 }
    expected: -1
    visible: true
  - input: { nums: [5], target: 5 }
    expected: 0
    visible: false
  - input: { nums: [1], target: 2 }
    expected: -1
    visible: false
  - input: { nums: [1, 2, 3, 4, 5], target: 1 }
    expected: 0
    visible: false
  - input: { nums: [1, 2, 3, 4, 5], target: 5 }
    expected: 4
    visible: false
  - input: { nums: [-9999, 0, 9999], target: -9999 }
    expected: 0
    visible: false
