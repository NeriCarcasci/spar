tests:
  - input: { nums1: [1, 3], nums2: [2] }
    expected: 2.0
    visible: true
  - input: { nums1: [1, 2], nums2: [3, 4] }
    expected: 2.5
    visible: true
  - input: { nums1: [], nums2: [1] }
    expected: 1.0
    visible: false
  - input: { nums1: [2], nums2: [] }
    expected: 2.0
    visible: false
  - input: { nums1: [1, 2, 3], nums2: [4, 5, 6] }
    expected: 3.5
    visible: false
  - input: { nums1: [1], nums2: [1] }
    expected: 1.0
    visible: false
  - input: { nums1: [1, 3, 5, 7], nums2: [2, 4, 6, 8] }
    expected: 4.5
    visible: false
