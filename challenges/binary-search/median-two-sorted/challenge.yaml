id: median-two-sorted
title: "Median of Two Sorted Arrays"
difficulty: hard
category: binary-search
collection: the-foundation
tags: [binary-search, divide-and-conquer]
languages: [python, go, javascript, cpp, rust]
description: |
  Given two sorted arrays `nums1` and `nums2` of size `m` and `n` respectively,
  return the median of the two sorted arrays.

  The overall run time complexity should be O(log(m+n)).
examples:
  - input: "nums1 = [1,3], nums2 = [2]"
    output: "2.0"
  - input: "nums1 = [1,2], nums2 = [3,4]"
    output: "2.5"
constraints:
  - "0 <= m, n <= 1000"
  - "1 <= m + n <= 2000"
  - "-10^6 <= nums1[i], nums2[i] <= 10^6"
time_limit_seconds: 30
hints:
  - "Binary search on the partition point of the shorter array."
  - "Ensure elements on the left partition are all <= elements on the right."
