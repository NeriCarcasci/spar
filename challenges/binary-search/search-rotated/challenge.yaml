id: search-rotated
title: "Search in Rotated Sorted Array"
difficulty: medium
category: binary-search
collection: the-foundation
tags: [binary-search, array]
languages: [python, go, javascript, cpp, rust]
description: |
  A sorted array has been rotated at some unknown pivot index. For example,
  `[0,1,2,4,5,6,7]` might become `[4,5,6,7,0,1,2]`.

  Given the rotated array `nums` and an integer `target`, return the index of
  `target` if it is in the array, or -1 if it is not.

  You must write an algorithm with O(log n) runtime complexity.
  All values in nums are unique.
examples:
  - input: "nums = [4,5,6,7,0,1,2], target = 0"
    output: "4"
  - input: "nums = [4,5,6,7,0,1,2], target = 3"
    output: "-1"
constraints:
  - "1 <= nums.length <= 5000"
  - "-10^4 <= nums[i] <= 10^4"
  - "All values are unique"
  - "nums was sorted then rotated at some pivot"
time_limit_seconds: 30
hints:
  - "One half of the array is always sorted after rotation."
  - "Determine which half is sorted, then check if target is in that range."
