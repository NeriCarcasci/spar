tests:
  - input: { nums: [4, 5, 6, 7, 0, 1, 2], target: 0 }
    expected: 4
    visible: true
  - input: { nums: [4, 5, 6, 7, 0, 1, 2], target: 3 }
    expected: -1
    visible: true
  - input: { nums: [1], target: 1 }
    expected: 0
    visible: false
  - input: { nums: [1], target: 0 }
    expected: -1
    visible: false
  - input: { nums: [3, 1], target: 1 }
    expected: 1
    visible: false
  - input: { nums: [1, 2, 3, 4, 5], target: 3 }
    expected: 2
    visible: false
  - input: { nums: [5, 1, 2, 3, 4], target: 5 }
    expected: 0
    visible: false
