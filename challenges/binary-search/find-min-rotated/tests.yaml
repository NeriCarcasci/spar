tests:
  - input: { nums: [3, 4, 5, 1, 2] }
    expected: 1
    visible: true
  - input: { nums: [4, 5, 6, 7, 0, 1, 2] }
    expected: 0
    visible: true
  - input: { nums: [1] }
    expected: 1
    visible: false
  - input: { nums: [2, 1] }
    expected: 1
    visible: false
  - input: { nums: [1, 2, 3, 4, 5] }
    expected: 1
    visible: false
  - input: { nums: [11, 13, 15, 17] }
    expected: 11
    visible: false
  - input: { nums: [5000, -5000] }
    expected: -5000
    visible: false
