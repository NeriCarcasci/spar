id: reverse-polish
title: "Evaluate Reverse Polish Notation"
difficulty: medium
category: stack
collection: the-foundation
tags: [stack, math]
languages: [python, go, javascript, cpp, rust]
description: |
  You are given an array of strings `tokens` that represents an arithmetic
  expression in Reverse Polish Notation (postfix notation).

  Evaluate the expression and return the result as an integer.

  Valid operators are `+`, `-`, `*`, and `/`. Each operand may be an integer
  or another expression. Division between two integers truncates toward zero.

  It is guaranteed the expression is always valid and evaluates to a result.
examples:
  - input: "tokens = [\"2\",\"1\",\"+\",\"3\",\"*\"]"
    output: "9"
    explanation: "((2 + 1) * 3) = 9"
  - input: "tokens = [\"4\",\"13\",\"5\",\"/\",\"+\"]"
    output: "6"
    explanation: "(4 + (13 / 5)) = 6"
constraints:
  - "1 <= tokens.length <= 10^4"
  - "tokens[i] is either an operator (+, -, *, /) or an integer in range [-200, 200]"
time_limit_seconds: 30
hints:
  - "Process tokens left to right. Push numbers onto the stack."
  - "When you encounter an operator, pop two operands and push the result."
