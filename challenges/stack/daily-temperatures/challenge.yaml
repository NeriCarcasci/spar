id: daily-temperatures
title: "Daily Temperatures"
difficulty: medium
category: stack
collection: the-foundation
tags: [stack, monotonic-stack]
languages: [python, go, javascript, cpp, rust]
description: |
  Given an array of integers `temperatures` representing daily temperatures,
  return an array `answer` such that `answer[i]` is the number of days you have
  to wait after the `i`th day to get a warmer temperature.

  If there is no future day with a warmer temperature, set `answer[i]` to 0.
examples:
  - input: "temperatures = [73,74,75,71,69,72,76,73]"
    output: "[1,1,4,2,1,1,0,0]"
  - input: "temperatures = [30,40,50,60]"
    output: "[1,1,1,0]"
constraints:
  - "1 <= temperatures.length <= 10^5"
  - "30 <= temperatures[i] <= 100"
time_limit_seconds: 30
hints:
  - "Use a monotonic decreasing stack of indices."
  - "When you find a warmer temperature, pop and compute the difference."
