tests:
  - input:
      temperatures: [73, 74, 75, 71, 69, 72, 76, 73]
    expected: [1, 1, 4, 2, 1, 1, 0, 0]
    visible: true
  - input:
      temperatures: [30, 40, 50, 60]
    expected: [1, 1, 1, 0]
    visible: true
  - input:
      temperatures: [50]
    expected: [0]
    visible: false
  - input:
      temperatures: [60, 50, 40, 30]
    expected: [0, 0, 0, 0]
    visible: false
  - input:
      temperatures: [30, 30, 30]
    expected: [0, 0, 0]
    visible: false
  - input:
      temperatures: [70, 60, 80]
    expected: [2, 1, 0]
    visible: false
  - input:
      temperatures: [30, 100, 30, 100]
    expected: [1, 0, 1, 0]
    visible: false
