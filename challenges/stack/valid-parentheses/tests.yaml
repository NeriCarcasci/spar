tests:
  - input:
      s: "()"
    expected: true
    visible: true
  - input:
      s: "()[]{}"
    expected: true
    visible: true
  - input:
      s: "(]"
    expected: false
    visible: false
  - input:
      s: "("
    expected: false
    visible: false
  - input:
      s: ")("
    expected: false
    visible: false
  - input:
      s: "{[]}"
    expected: true
    visible: false
  - input:
      s: "((()))"
    expected: true
    visible: false
