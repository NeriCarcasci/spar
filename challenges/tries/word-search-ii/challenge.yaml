id: word-search-ii
title: "Word Search II"
difficulty: hard
category: tries
collection: the-foundation
tags: [trie, backtracking, matrix, dfs]
languages: [python, go, javascript, cpp, rust]
description: |
  Given an `m x n` board of characters and a list of words, return all words
  that can be found in the board.

  Each word must be constructed from letters of sequentially adjacent cells,
  where adjacent cells are horizontally or vertically neighboring. The same
  letter cell may not be used more than once in a single word.

  Return the found words in sorted order.
examples:
  - input: "board = [['o','a','a','n'],['e','t','a','e'],['i','h','k','r'],['i','f','l','v']], words = ['oath','pea','eat','rain']"
    output: "['eat','oath']"
    explanation: "Both 'eat' and 'oath' can be traced on the board"
  - input: "board = [['a','b'],['c','d']], words = ['abcb']"
    output: "[]"
constraints:
  - "m == board.length, n == board[i].length"
  - "1 <= m, n <= 12"
  - "board[i][j] is a lowercase English letter"
  - "1 <= words.length <= 3 * 10^4"
  - "1 <= words[i].length <= 10"
time_limit_seconds: 60
hints:
  - "Build a trie from the word list, then DFS from each cell."
  - "Prune trie branches as you find words to avoid redundant searches."
