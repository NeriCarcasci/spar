tests:
  - input:
      nums: [1, 2, 3, 4]
    expected: [24, 12, 8, 6]
    visible: true

  - input:
      nums: [-1, 1, 0, -3, 3]
    expected: [0, 0, 9, 0, 0]
    visible: true

  - input:
      nums: [1, 1]
    expected: [1, 1]
    visible: false

  - input:
      nums: [0, 0]
    expected: [0, 0]
    visible: false

  - input:
      nums: [2, 3, 5, 7]
    expected: [105, 70, 42, 30]
    visible: false

  - input:
      nums: [-1, -2, -3]
    expected: [6, 3, 2]
    visible: false

  - input:
      nums: [1, 0, 0, 1]
    expected: [0, 0, 0, 0]
    visible: false
