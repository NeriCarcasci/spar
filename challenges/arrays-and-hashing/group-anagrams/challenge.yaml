id: group-anagrams
title: "Group Anagrams"
difficulty: medium
category: arrays-and-hashing
collection: the-foundation
tags: [hash-map, sorting, string]
languages: [python, go, javascript, cpp, rust]
description: |
  Given an array of strings `strs`, group the anagrams together. You can return
  the answer in any order.

  An anagram is a word formed by rearranging the letters of another word,
  using all the original letters exactly once.
examples:
  - input: "strs = [\"eat\",\"tea\",\"tan\",\"ate\",\"nat\",\"bat\"]"
    output: "[[\"bat\"],[\"nat\",\"tan\"],[\"ate\",\"eat\",\"tea\"]]"
    explanation: "Words that are anagrams of each other are grouped together"
  - input: "strs = [\"\"]"
    output: "[[\"\"]]"
constraints:
  - "1 <= strs.length <= 10^4"
  - "0 <= strs[i].length <= 100"
  - "strs[i] consists of lowercase English letters"
time_limit_seconds: 30
hints:
  - "Two strings are anagrams if they have the same character frequency."
  - "What could you use as a hash map key to group anagrams together?"
