id: valid-sudoku
title: "Valid Sudoku"
difficulty: medium
category: arrays-and-hashing
collection: the-foundation
tags: [hash-set, matrix]
languages: [python, go, javascript, cpp, rust]
description: |
  Determine if a 9x9 Sudoku board is valid. Only the filled cells need to be
  validated according to the following rules:

  1. Each row must contain the digits 1-9 without repetition.
  2. Each column must contain the digits 1-9 without repetition.
  3. Each of the nine 3x3 sub-boxes must contain the digits 1-9 without repetition.

  The board may be partially filled, where empty cells are represented by `"."`.
  A valid board is not necessarily solvable — you only need to check whether the
  filled cells violate the rules.
examples:
  - input: "board = [[\"5\",\"3\",\".\",\".\",\"7\",\".\",\".\",\".\",\".\"],[\"6\",\".\",\".\",\"1\",\"9\",\"5\",\".\",\".\",\".\"],[\".\",\"9\",\"8\",\".\",\".\",\".\",\".\",\"6\",\".\"],[\"8\",\".\",\".\",\".\",\"6\",\".\",\".\",\".\",\"3\"],[\"4\",\".\",\".\",\"8\",\".\",\"3\",\".\",\".\",\"1\"],[\"7\",\".\",\".\",\".\",\"2\",\".\",\".\",\".\",\"6\"],[\".\",\"6\",\".\",\".\",\".\",\".\",\"2\",\"8\",\".\"],[\".\",\".\",\".\",\"4\",\"1\",\"9\",\".\",\".\",\"5\"],[\".\",\".\",\".\",\".\",\"8\",\".\",\".\",\"7\",\"9\"]]"
    output: "true"
  - input: "board (same as above but with 8 in top-left corner duplicated in sub-box)"
    output: "false"
constraints:
  - "board.length == 9"
  - "board[i].length == 9"
  - "board[i][j] is a digit 1-9 or '.'"
time_limit_seconds: 30
hints:
  - "Track what you have seen in each row, column, and 3x3 box."
  - "The box index for cell (r,c) is (r/3)*3 + c/3."
