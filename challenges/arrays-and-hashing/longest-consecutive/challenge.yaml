id: longest-consecutive
title: "Longest Consecutive Sequence"
difficulty: medium
category: arrays-and-hashing
collection: the-foundation
tags: [hash-set, sequence]
languages: [python, go, javascript, cpp, rust]
description: |
  Given an unsorted array of integers `nums`, return the length of the longest
  consecutive elements sequence.

  You must write an algorithm that runs in O(n) time.
examples:
  - input: "nums = [100,4,200,1,3,2]"
    output: "4"
    explanation: "The longest consecutive sequence is [1,2,3,4], which has length 4"
  - input: "nums = [0,3,7,2,5,8,4,6,0,1]"
    output: "9"
constraints:
  - "0 <= nums.length <= 10^5"
  - "-10^9 <= nums[i] <= 10^9"
time_limit_seconds: 30
hints:
  - "Only start counting a sequence from its smallest element."
  - "How can you tell if a number is the start of a sequence?"
