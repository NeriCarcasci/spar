tests:
  - input:
      nums: [100, 4, 200, 1, 3, 2]
    expected: 4
    visible: true

  - input:
      nums: [0, 3, 7, 2, 5, 8, 4, 6, 0, 1]
    expected: 9
    visible: true

  - input:
      nums: []
    expected: 0
    visible: false

  - input:
      nums: [1]
    expected: 1
    visible: false

  - input:
      nums: [1, 1, 1, 1]
    expected: 1
    visible: false

  - input:
      nums: [-5, -4, -3, -2, -1]
    expected: 5
    visible: false

  - input:
      nums: [1, 3, 5, 7, 9]
    expected: 1
    visible: false
