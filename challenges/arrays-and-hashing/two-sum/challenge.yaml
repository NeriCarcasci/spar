id: two-sum
title: "Two Sum"
difficulty: easy
category: arrays-and-hashing
collection: the-foundation
tags: [hash-map, brute-force]
languages: [python, go, javascript, cpp, rust]
description: |
  Given an array of integers `nums` and an integer `target`, return the indices
  of the two numbers that add up to `target`.

  You may assume that each input has exactly one solution, and you may not use
  the same element twice.

  Return the answer as a pair of indices in any order.
examples:
  - input: "nums = [2,7,11,15], target = 9"
    output: "[0,1]"
    explanation: "nums[0] + nums[1] == 9"
  - input: "nums = [3,2,4], target = 6"
    output: "[1,2]"
constraints:
  - "2 <= nums.length <= 10^4"
  - "-10^9 <= nums[i] <= 10^9"
  - "Only one valid answer exists"
time_limit_seconds: 30
hints:
  - "For each number, what value would you need to find to reach the target?"
  - "Is there a data structure that gives you O(1) lookup?"
