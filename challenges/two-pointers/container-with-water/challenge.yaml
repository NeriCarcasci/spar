id: container-with-water
title: "Container With Most Water"
difficulty: medium
category: two-pointers
collection: the-foundation
tags: [two-pointers, greedy]
languages: [python, go, javascript, cpp, rust]
description: |
  You are given an integer array `height` of length `n`. There are `n` vertical
  lines drawn such that the two endpoints of the `i`th line are `(i, 0)` and
  `(i, height[i])`.

  Find two lines that together with the x-axis form a container that holds the
  most water.

  Return the maximum amount of water the container can store. The container
  cannot be tilted.
examples:
  - input: "height = [1,8,6,2,5,4,8,3,7]"
    output: "49"
    explanation: "Lines at index 1 (height 8) and index 8 (height 7) form a container of area 7 * 7 = 49"
  - input: "height = [1,1]"
    output: "1"
constraints:
  - "2 <= height.length <= 10^5"
  - "0 <= height[i] <= 10^4"
time_limit_seconds: 30
hints:
  - "Start with the widest container and narrow it."
  - "Always move the pointer with the shorter line — the taller one can't do better with less width."
