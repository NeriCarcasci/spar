id: three-sum
title: "Three Sum"
difficulty: medium
category: two-pointers
collection: the-foundation
tags: [two-pointers, sorting]
languages: [python, go, javascript, cpp, rust]
description: |
  Given an integer array `nums`, return all the triplets `[nums[i], nums[j], nums[k]]`
  such that `i != j`, `i != k`, and `j != k`, and `nums[i] + nums[j] + nums[k] == 0`.

  The solution set must not contain duplicate triplets. Return the triplets sorted.
examples:
  - input: "nums = [-1,0,1,2,-1,-4]"
    output: "[[-1,-1,2],[-1,0,1]]"
  - input: "nums = [0,1,1]"
    output: "[]"
constraints:
  - "3 <= nums.length <= 3000"
  - "-10^5 <= nums[i] <= 10^5"
time_limit_seconds: 30
hints:
  - "Sort the array first. Fix one element and use two pointers for the remaining two."
  - "Skip duplicate values to avoid duplicate triplets."
