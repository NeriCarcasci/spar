id: trapping-rain-water
title: "Trapping Rain Water"
difficulty: hard
category: two-pointers
collection: the-foundation
tags: [two-pointers, stack, dynamic-programming]
languages: [python, go, javascript, cpp, rust]
description: |
  Given `n` non-negative integers representing an elevation map where the width
  of each bar is 1, compute how much water it can trap after raining.
examples:
  - input: "height = [0,1,0,2,1,0,1,3,2,1,2,1]"
    output: "6"
  - input: "height = [4,2,0,3,2,5]"
    output: "9"
constraints:
  - "n == height.length"
  - "1 <= n <= 2 * 10^4"
  - "0 <= height[i] <= 10^5"
time_limit_seconds: 30
hints:
  - "At each position, the water level is min(maxLeft, maxRight) - height[i]."
  - "Can you compute this with two pointers in a single pass?"
