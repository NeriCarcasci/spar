tests:
  - input:
      numbers: [2, 7, 11, 15]
      target: 9
    expected: [1, 2]
    visible: true
  - input:
      numbers: [2, 3, 4]
      target: 6
    expected: [1, 3]
    visible: true
  - input:
      numbers: [-1, 0]
      target: -1
    expected: [1, 2]
    visible: false
  - input:
      numbers: [1, 2, 3, 4, 5]
      target: 9
    expected: [4, 5]
    visible: false
  - input:
      numbers: [-3, -1, 0, 1, 5, 8]
      target: 4
    expected: [2, 6]
    visible: false
  - input:
      numbers: [1, 1, 1, 1, 4]
      target: 5
    expected: [1, 5]
    visible: false
  - input:
      numbers: [-1000, -1, 0, 1, 1000]
      target: 0
    expected: [1, 5]
    visible: false
