id: two-sum-sorted
title: "Two Sum II (Sorted Input)"
difficulty: medium
category: two-pointers
collection: the-foundation
tags: [two-pointers, binary-search]
languages: [python, go, javascript, cpp, rust]
description: |
  Given a 1-indexed array of integers `numbers` that is already sorted in
  non-decreasing order, find two numbers such that they add up to a specific
  `target` number.

  Return the indices of the two numbers (1-indexed) as an array `[index1, index2]`
  where `index1 < index2`.

  You may not use the same element twice. There is exactly one solution.
examples:
  - input: "numbers = [2,7,11,15], target = 9"
    output: "[1,2]"
  - input: "numbers = [2,3,4], target = 6"
    output: "[1,3]"
constraints:
  - "2 <= numbers.length <= 3 * 10^4"
  - "-1000 <= numbers[i] <= 1000"
  - "numbers is sorted in non-decreasing order"
  - "Exactly one solution exists"
time_limit_seconds: 30
hints:
  - "Since the array is sorted, how can two pointers help?"
  - "If the sum is too large, move the right pointer left. If too small, move left pointer right."
