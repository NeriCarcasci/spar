tests:
  - input:
      prices: [7, 1, 5, 3, 6, 4]
    expected: 5
    visible: true
  - input:
      prices: [7, 6, 4, 3, 1]
    expected: 0
    visible: true
  - input:
      prices: [1]
    expected: 0
    visible: false
  - input:
      prices: [2, 4]
    expected: 2
    visible: false
  - input:
      prices: [1, 1, 1, 1]
    expected: 0
    visible: false
  - input:
      prices: [3, 1, 4, 1, 5, 9, 2, 6]
    expected: 8
    visible: false
  - input:
      prices: [10000, 0, 10000]
    expected: 10000
    visible: false
