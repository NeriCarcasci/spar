tests:
  - input:
      nums: [1, 3, -1, -3, 5, 3, 6, 7]
      k: 3
    expected: [3, 3, 5, 5, 6, 7]
    visible: true
  - input:
      nums: [1]
      k: 1
    expected: [1]
    visible: true
  - input:
      nums: [1, -1]
      k: 1
    expected: [1, -1]
    visible: false
  - input:
      nums: [7, 2, 4]
      k: 2
    expected: [7, 4]
    visible: false
  - input:
      nums: [1, 2, 3, 4, 5]
      k: 5
    expected: [5]
    visible: false
  - input:
      nums: [5, 4, 3, 2, 1]
      k: 3
    expected: [5, 4, 3]
    visible: false
  - input:
      nums: [-1, -2, -3, -4]
      k: 2
    expected: [-1, -2, -3]
    visible: false
