id: invert-binary-tree
title: "Invert Binary Tree"
difficulty: easy
category: trees
collection: the-foundation
tags: [binary-tree, recursion, dfs]
languages: [python, go, javascript, cpp, rust]
description: |
  Given the root of a binary tree, invert the tree (mirror it) and return
  its root.

  Inverting a binary tree means swapping the left and right children of
  every node in the tree.
examples:
  - input: "root = [4,2,7,1,3,6,9]"
    output: "[4,7,2,9,6,3,1]"
    explanation: "The tree is mirrored around its center"
  - input: "root = [2,1,3]"
    output: "[2,3,1]"
constraints:
  - "The number of nodes is in the range [0, 100]"
  - "-100 <= Node.val <= 100"
time_limit_seconds: 30
hints:
  - "Think about what happens if you swap left and right children of every node."
  - "Can you solve this recursively? What's the base case?"
