id: same-tree
title: "Same Tree"
difficulty: easy
category: trees
collection: the-foundation
tags: [binary-tree, recursion, dfs]
languages: [python, go, javascript, cpp, rust]
description: |
  Given the roots of two binary trees `p` and `q`, write a function to
  check if they are the same or not.

  Two binary trees are considered the same if they are structurally
  identical, and the nodes have the same value.
examples:
  - input: "p = [1,2,3], q = [1,2,3]"
    output: "true"
  - input: "p = [1,2], q = [1,null,2]"
    output: "false"
    explanation: "The structure differs even though the values are the same"
constraints:
  - "The number of nodes in both trees is in the range [0, 100]"
  - "-10^4 <= Node.val <= 10^4"
time_limit_seconds: 30
hints:
  - "Two trees are the same if their roots are equal and their subtrees are the same."
  - "What are the base cases when one or both trees are empty?"
