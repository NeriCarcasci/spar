tests:
  - input:
      p: [1, 2, 3]
      q: [1, 2, 3]
    expected: true
    visible: true

  - input:
      p: [1, 2]
      q: [1, null, 2]
    expected: false
    visible: true

  - input:
      p: []
      q: []
    expected: true
    visible: false

  - input:
      p: [1]
      q: [1]
    expected: true
    visible: false

  - input:
      p: [1, 2]
      q: [1, 2, 3]
    expected: false
    visible: false
