id: build-tree-preorder
title: "Construct Binary Tree from Preorder and Inorder Traversal"
difficulty: medium
category: trees
collection: the-foundation
tags: [binary-tree, recursion, divide-and-conquer]
languages: [python, go, javascript, cpp, rust]
description: |
  Given two integer arrays `preorder` and `inorder` where `preorder` is the
  preorder traversal of a binary tree and `inorder` is the inorder traversal
  of the same tree, construct and return the binary tree.

  Return the tree as a level-order array.
examples:
  - input: "preorder = [3,9,20,15,7], inorder = [9,3,15,20,7]"
    output: "[3,9,20,null,null,15,7]"
  - input: "preorder = [-1], inorder = [-1]"
    output: "[-1]"
constraints:
  - "1 <= preorder.length <= 3000"
  - "inorder.length == preorder.length"
  - "-3000 <= preorder[i], inorder[i] <= 3000"
  - "preorder and inorder consist of unique values"
  - "Each value of inorder also appears in preorder"
time_limit_seconds: 30
hints:
  - "The first element of preorder is always the root."
  - "Find the root in inorder to determine which elements belong to the left and right subtrees."
