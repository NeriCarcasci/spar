tests:
  - input:
      root: [3, 1, 4, null, 2]
      k: 1
    expected: 1
    visible: true

  - input:
      root: [5, 3, 6, 2, 4, null, null, 1]
      k: 3
    expected: 3
    visible: true

  - input:
      root: [1]
      k: 1
    expected: 1
    visible: false

  - input:
      root: [2, 1, 3]
      k: 2
    expected: 2
    visible: false

  - input:
      root: [2, 1, 3]
      k: 3
    expected: 3
    visible: false
