id: max-depth-tree
title: "Maximum Depth of Binary Tree"
difficulty: easy
category: trees
collection: the-foundation
tags: [binary-tree, recursion, dfs]
languages: [python, go, javascript, cpp, rust]
description: |
  Given the root of a binary tree, return its maximum depth.

  A binary tree's maximum depth is the number of nodes along the longest
  path from the root node down to the farthest leaf node.
examples:
  - input: "root = [3,9,20,null,null,15,7]"
    output: "3"
    explanation: "The longest path is root -> 20 -> 15 (or 7), which has 3 nodes"
  - input: "root = [1,null,2]"
    output: "2"
constraints:
  - "The number of nodes is in the range [0, 10^4]"
  - "-100 <= Node.val <= 100"
time_limit_seconds: 30
hints:
  - "The depth of a tree is 1 + the maximum depth of its subtrees."
  - "What is the depth of an empty tree?"
