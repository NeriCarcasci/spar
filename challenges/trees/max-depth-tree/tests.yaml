tests:
  - input:
      root: [3, 9, 20, null, null, 15, 7]
    expected: 3
    visible: true

  - input:
      root: [1, null, 2]
    expected: 2
    visible: true

  - input:
      root: []
    expected: 0
    visible: false

  - input:
      root: [1]
    expected: 1
    visible: false

  - input:
      root: [1, 2, 3, 4, 5]
    expected: 3
    visible: false
