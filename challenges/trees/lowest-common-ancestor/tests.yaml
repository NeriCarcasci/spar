tests:
  - input:
      root: [6, 2, 8, 0, 4, 7, 9, null, null, 3, 5]
      p: 2
      q: 8
    expected: 6
    visible: true

  - input:
      root: [6, 2, 8, 0, 4, 7, 9, null, null, 3, 5]
      p: 2
      q: 4
    expected: 2
    visible: true

  - input:
      root: [2, 1]
      p: 2
      q: 1
    expected: 2
    visible: false

  - input:
      root: [6, 2, 8]
      p: 2
      q: 8
    expected: 6
    visible: false

  - input:
      root: [3, 1, 5, 0, 2, 4, 6]
      p: 0
      q: 2
    expected: 1
    visible: false
