id: validate-bst
title: "Validate Binary Search Tree"
difficulty: medium
category: trees
collection: the-foundation
tags: [binary-search-tree, recursion, dfs]
languages: [python, go, javascript, cpp, rust]
description: |
  Given the root of a binary tree, determine if it is a valid binary search
  tree (BST).

  A valid BST is defined as follows:
  - The left subtree of a node contains only nodes with keys strictly less
    than the node's key.
  - The right subtree of a node contains only nodes with keys strictly
    greater than the node's key.
  - Both the left and right subtrees must also be binary search trees.
examples:
  - input: "root = [2,1,3]"
    output: "true"
  - input: "root = [5,1,4,null,null,3,6]"
    output: "false"
    explanation: "The root node's right child is 4, which is less than 5"
constraints:
  - "The number of nodes is in the range [1, 10^4]"
  - "-2^31 <= Node.val <= 2^31 - 1"
time_limit_seconds: 30
hints:
  - "Each node has an implicit valid range based on its ancestors."
  - "An in-order traversal of a valid BST produces a strictly increasing sequence."
