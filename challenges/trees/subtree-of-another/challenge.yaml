id: subtree-of-another
title: "Subtree of Another Tree"
difficulty: easy
category: trees
collection: the-foundation
tags: [binary-tree, recursion, dfs]
languages: [python, go, javascript, cpp, rust]
description: |
  Given the roots of two binary trees `root` and `subRoot`, return true if
  there is a subtree of `root` with the same structure and node values as
  `subRoot`.

  A subtree of a binary tree is a tree that consists of a node in the tree
  and all of this node's descendants. The tree could also be considered as
  a subtree of itself.
examples:
  - input: "root = [3,4,5,1,2], subRoot = [4,1,2]"
    output: "true"
  - input: "root = [3,4,5,1,2,null,null,null,null,0], subRoot = [4,1,2]"
    output: "false"
    explanation: "The subtree [4,1,2,null,null,0] has an extra node"
constraints:
  - "The number of nodes in root is in the range [1, 2000]"
  - "The number of nodes in subRoot is in the range [1, 1000]"
  - "-10^4 <= Node.val <= 10^4"
time_limit_seconds: 30
hints:
  - "For each node in root, check if the subtree rooted at that node matches subRoot."
  - "You can reuse a 'same tree' check as a helper function."
