tests:
  - input:
      root: [3, 4, 5, 1, 2]
      subRoot: [4, 1, 2]
    expected: true
    visible: true

  - input:
      root: [3, 4, 5, 1, 2, null, null, null, null, 0]
      subRoot: [4, 1, 2]
    expected: false
    visible: true

  - input:
      root: [1]
      subRoot: [1]
    expected: true
    visible: false

  - input:
      root: [1, 2, 3]
      subRoot: [2]
    expected: true
    visible: false

  - input:
      root: [1, null, 2]
      subRoot: [2]
    expected: true
    visible: false
