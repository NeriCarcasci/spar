id: binary-tree-max-path
title: "Binary Tree Maximum Path Sum"
difficulty: hard
category: trees
collection: the-foundation
tags: [binary-tree, recursion, dfs, dynamic-programming]
languages: [python, go, javascript, cpp, rust]
description: |
  A path in a binary tree is a sequence of nodes where each pair of adjacent
  nodes in the sequence has an edge connecting them. A node can only appear
  in the sequence at most once. Note that the path does not need to pass
  through the root.

  The path sum of a path is the sum of the node's values in the path.

  Given the root of a binary tree, return the maximum path sum of any
  non-empty path.
examples:
  - input: "root = [1,2,3]"
    output: "6"
    explanation: "The optimal path is 2 -> 1 -> 3 with a path sum of 6"
  - input: "root = [-10,9,20,null,null,15,7]"
    output: "42"
    explanation: "The optimal path is 15 -> 20 -> 7 with a path sum of 42"
constraints:
  - "The number of nodes is in the range [1, 3 * 10^4]"
  - "-1000 <= Node.val <= 1000"
time_limit_seconds: 30
hints:
  - "At each node, consider the maximum gain from the left and right subtrees."
  - "The path through a node can either continue upward (single branch) or split at that node (both branches)."
