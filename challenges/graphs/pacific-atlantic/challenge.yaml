id: pacific-atlantic
title: "Pacific Atlantic Water Flow"
difficulty: medium
category: graphs
collection: the-foundation
tags: [bfs, dfs, matrix]
languages: [python, go, javascript, cpp, rust]
description: |
  There is an `m x n` rectangular island that borders both the Pacific Ocean
  and the Atlantic Ocean. The Pacific Ocean touches the island's left and top
  edges, and the Atlantic Ocean touches the island's right and bottom edges.

  The island is partitioned into a grid of square cells. You are given an
  `m x n` integer matrix `heights` where `heights[r][c]` represents the height
  above sea level of the cell at coordinate `(r, c)`.

  The island receives a lot of rain, and the rain water can flow to neighboring
  cells directly north, south, east, and west if the neighboring cell's height
  is less than or equal to the current cell's height. Water can flow from any
  cell adjacent to an ocean into the ocean.

  Return a 2D list of grid coordinates `result` where `result[i] = [ri, ci]`
  denotes that rain water can flow from cell `(ri, ci)` to both the Pacific and
  Atlantic oceans. The result may be returned in any order.
examples:
  - input: "heights = [[1,2,2,3,5],[3,2,3,4,4],[2,4,5,3,1],[6,7,1,4,5],[5,1,1,2,4]]"
    output: "[[0,4],[1,3],[1,4],[2,2],[3,0],[3,1],[4,0]]"
  - input: "heights = [[1]]"
    output: "[[0,0]]"
constraints:
  - "m == heights.length"
  - "n == heights[r].length"
  - "1 <= m, n <= 200"
  - "0 <= heights[r][c] <= 100000"
time_limit_seconds: 30
hints:
  - "Instead of flowing water downhill from every cell, think about flowing water uphill from each ocean."
  - "Do a BFS/DFS from all Pacific border cells and mark reachable cells. Do the same from Atlantic border cells. The answer is the intersection."
