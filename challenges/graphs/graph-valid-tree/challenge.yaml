id: graph-valid-tree
title: "Graph Valid Tree"
difficulty: medium
category: graphs
collection: the-foundation
tags: [union-find, bfs, dfs, tree]
languages: [python, go, javascript, cpp, rust]
description: |
  Given `n` nodes labeled from `0` to `n - 1` and a list of undirected edges
  (each edge is a pair of nodes), write a function to check whether these edges
  make up a valid tree.

  A valid tree must satisfy the following conditions:
  - The graph is fully connected (all nodes are reachable from any node).
  - The graph has no cycles.

  Note: You can assume that no duplicate edges will appear in the edges list.
  Since all edges are undirected, `[0, 1]` is the same as `[1, 0]` and thus
  will not appear together in the edges list.
examples:
  - input: "n = 5, edges = [[0,1],[0,2],[0,3],[1,4]]"
    output: "true"
  - input: "n = 5, edges = [[0,1],[1,2],[2,3],[1,3],[1,4]]"
    output: "false"
constraints:
  - "1 <= n <= 2000"
  - "0 <= edges.length <= 5000"
  - "edges[i].length == 2"
  - "0 <= ai, bi < n"
  - "ai != bi"
  - "There are no duplicate edges."
time_limit_seconds: 30
hints:
  - "A valid tree with n nodes has exactly n - 1 edges."
  - "Check if the graph has exactly n - 1 edges and is fully connected using Union-Find or BFS/DFS."
