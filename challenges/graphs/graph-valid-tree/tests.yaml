tests:
  - input:
      n: 5
      edges: [[0,1],[0,2],[0,3],[1,4]]
    expected: true
    visible: true
  - input:
      n: 5
      edges: [[0,1],[1,2],[2,3],[1,3],[1,4]]
    expected: false
    visible: true
  - input:
      n: 1
      edges: []
    expected: true
    visible: false
  - input:
      n: 4
      edges: [[0,1],[2,3]]
    expected: false
    visible: false
  - input:
      n: 2
      edges: [[0,1]]
    expected: true
    visible: false
  - input:
      n: 3
      edges: [[0,1],[1,2],[0,2]]
    expected: false
    visible: false
