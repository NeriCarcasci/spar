id: num-connected-components
title: "Number of Connected Components in an Undirected Graph"
difficulty: medium
category: graphs
collection: the-foundation
tags: [union-find, bfs, dfs, connected-components]
languages: [python, go, javascript, cpp, rust]
description: |
  You have a graph of `n` nodes labeled from `0` to `n - 1`. You are given an
  integer `n` and a list of `edges` where `edges[i] = [ai, bi]` indicates that
  there is an undirected edge between nodes `ai` and `bi` in the graph.

  Return the number of connected components in the graph.
examples:
  - input: "n = 5, edges = [[0,1],[1,2],[3,4]]"
    output: "2"
  - input: "n = 5, edges = [[0,1],[1,2],[2,3],[3,4]]"
    output: "1"
constraints:
  - "1 <= n <= 2000"
  - "0 <= edges.length <= 5000"
  - "edges[i].length == 2"
  - "0 <= ai, bi < n"
  - "ai != bi"
  - "There are no duplicate edges."
time_limit_seconds: 30
hints:
  - "Use Union-Find: start with n components and merge components for each edge."
  - "Alternatively, use BFS/DFS from each unvisited node, counting how many times you start a new traversal."
