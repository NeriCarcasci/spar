id: course-schedule
title: "Course Schedule"
difficulty: medium
category: graphs
collection: the-foundation
tags: [topological-sort, bfs, dfs, cycle-detection]
languages: [python, go, javascript, cpp, rust]
description: |
  There are a total of `numCourses` courses you have to take, labeled from
  `0` to `numCourses - 1`. You are given an array `prerequisites` where
  `prerequisites[i] = [ai, bi]` indicates that you must take course `bi`
  first if you want to take course `ai`.

  For example, the pair `[0, 1]` indicates that to take course `0` you have
  to first take course `1`.

  Return `true` if you can finish all courses. Otherwise, return `false`.
examples:
  - input: "numCourses = 2, prerequisites = [[1,0]]"
    output: "true"
  - input: "numCourses = 2, prerequisites = [[1,0],[0,1]]"
    output: "false"
constraints:
  - "1 <= numCourses <= 2000"
  - "0 <= prerequisites.length <= 5000"
  - "prerequisites[i].length == 2"
  - "0 <= ai, bi < numCourses"
  - "All the pairs prerequisites[i] are unique."
time_limit_seconds: 30
hints:
  - "This problem is equivalent to detecting a cycle in a directed graph."
  - "Use topological sort via BFS (Kahn's algorithm) or DFS with coloring to detect cycles."
