tests:
  - input:
      adjList: [[2,4],[1,3],[2,4],[1,3]]
    expected: [[2,4],[1,3],[2,4],[1,3]]
    visible: true
  - input:
      adjList: [[]]
    expected: [[]]
    visible: true
  - input:
      adjList: []
    expected: []
    visible: false
  - input:
      adjList: [[2],[1,3],[2]]
    expected: [[2],[1,3],[2]]
    visible: false
  - input:
      adjList: [[2,3,4],[1],[1],[1]]
    expected: [[2,3,4],[1],[1],[1]]
    visible: false
  - input:
      adjList: [[2],[1,3],[2,4],[3,5],[4]]
    expected: [[2],[1,3],[2,4],[3,5],[4]]
    visible: false
