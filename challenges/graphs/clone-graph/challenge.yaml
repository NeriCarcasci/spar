id: clone-graph
title: "Clone Graph"
difficulty: medium
category: graphs
collection: the-foundation
tags: [bfs, dfs, hash-map, graph]
languages: [python, go, javascript, cpp, rust]
description: |
  Given a reference to a node in a connected undirected graph, return a deep
  copy (clone) of the graph.

  Each node in the graph contains a value (`val`) and a list of its neighbors
  (`neighbors`).

  The graph is represented in the test cases using an adjacency list. An
  adjacency list is a collection of unordered lists used to represent a finite
  graph. Each list describes the set of neighbors of a node in the graph.

  The given node will always be the first node with `val = 1`. You must return
  the copy of the given node as a reference to the cloned graph.

  For testing purposes, input and output are given as adjacency lists. The
  returned graph must be a deep copy -- modifying the cloned graph must not
  affect the original.
examples:
  - input: "adjList = [[2,4],[1,3],[2,4],[1,3]]"
    output: "[[2,4],[1,3],[2,4],[1,3]]"
  - input: "adjList = [[]]"
    output: "[[]]"
  - input: "adjList = []"
    output: "[]"
constraints:
  - "The number of nodes in the graph is in the range [0, 100]."
  - "1 <= Node.val <= 100"
  - "Node.val is unique for each node."
  - "There are no repeated edges and no self-loops in the graph."
  - "The graph is connected and all nodes can be visited starting from the given node."
time_limit_seconds: 30
hints:
  - "Use a hash map to store the mapping from original nodes to their clones."
  - "BFS or DFS can be used to traverse the original graph while building the clone."
