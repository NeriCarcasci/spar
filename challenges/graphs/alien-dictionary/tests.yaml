tests:
  - input:
      words: ["wrt","wrf","er","ett","rftt"]
    expected: "wertf"
    visible: true
  - input:
      words: ["z","x"]
    expected: "zx"
    visible: true
  - input:
      words: ["z","x","z"]
    expected: ""
    visible: false
  - input:
      words: ["abc","ab"]
    expected: ""
    visible: false
  - input:
      words: ["z"]
    expected: "z"
    visible: false
  - input:
      words: ["a","b","ca","cc"]
    expected: "abc"
    visible: false
  - input:
      words: ["ab","abc"]
    expected: "abc"
    visible: false
