id: word-search
title: "Word Search"
difficulty: medium
category: backtracking
collection: the-foundation
tags: [backtracking, matrix, dfs]
languages: [python, go, javascript, cpp, rust]
description: |
  Given an `m x n` grid of characters `board` and a string `word`, return
  `true` if `word` exists in the grid.

  The word can be constructed from letters of sequentially adjacent cells,
  where adjacent cells are horizontally or vertically neighboring. The same
  letter cell may not be used more than once.
examples:
  - input: "board = [['A','B','C','E'],['S','F','C','S'],['A','D','E','E']], word = 'ABCCED'"
    output: "true"
  - input: "board = [['A','B','C','E'],['S','F','C','S'],['A','D','E','E']], word = 'SEE'"
    output: "true"
  - input: "board = [['A','B','C','E'],['S','F','C','S'],['A','D','E','E']], word = 'ABCB'"
    output: "false"
constraints:
  - "m == board.length, n == board[i].length"
  - "1 <= m, n <= 6"
  - "1 <= word.length <= 15"
  - "board and word consist of only lowercase and uppercase English letters"
time_limit_seconds: 30
hints:
  - "Try starting from every cell and use DFS to explore adjacent cells."
  - "Mark cells as visited during the search and unmark them when backtracking."
