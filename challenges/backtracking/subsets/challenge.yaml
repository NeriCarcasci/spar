id: subsets
title: "Subsets"
difficulty: medium
category: backtracking
collection: the-foundation
tags: [backtracking, bit-manipulation, array]
languages: [python, go, javascript, cpp, rust]
description: |
  Given an integer array `nums` of unique elements, return all possible
  subsets (the power set).

  The solution set must not contain duplicate subsets. Return the subsets
  sorted (each subset sorted, and the list sorted lexicographically).
examples:
  - input: "nums = [1,2,3]"
    output: "[[],[1],[1,2],[1,2,3],[1,3],[2],[2,3],[3]]"
  - input: "nums = [0]"
    output: "[[],[0]]"
constraints:
  - "1 <= nums.length <= 10"
  - "-10 <= nums[i] <= 10"
  - "All the numbers of nums are unique"
time_limit_seconds: 30
hints:
  - "For each element, decide whether to include it or not."
  - "Alternatively, use bit masking: each subset corresponds to a binary number."
