tests:
  - input:
      head: [1, 2, 3, 4, 5]
    expected: [5, 4, 3, 2, 1]
    visible: true
  - input:
      head: [1, 2]
    expected: [2, 1]
    visible: true
  - input:
      head: []
    expected: []
    visible: false
  - input:
      head: [1]
    expected: [1]
    visible: false
  - input:
      head: [1, 2, 3]
    expected: [3, 2, 1]
    visible: false
