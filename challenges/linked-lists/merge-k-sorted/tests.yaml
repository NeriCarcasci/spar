tests:
  - input: { lists: [[1, 4, 5], [1, 3, 4], [2, 6]] }
    expected: [1, 1, 2, 3, 4, 4, 5, 6]
    visible: true
  - input: { lists: [] }
    expected: []
    visible: true
  - input: { lists: [[]] }
    expected: []
    visible: false
  - input: { lists: [[1]] }
    expected: [1]
    visible: false
  - input: { lists: [[1, 2], [3, 4], [5, 6]] }
    expected: [1, 2, 3, 4, 5, 6]
    visible: false
  - input: { lists: [[-2, -1], [-3, 0], [-4, 1]] }
    expected: [-4, -3, -2, -1, 0, 1]
    visible: false
