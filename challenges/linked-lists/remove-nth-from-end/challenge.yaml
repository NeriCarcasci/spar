id: remove-nth-from-end
title: "Remove Nth Node From End"
difficulty: medium
category: linked-lists
collection: the-foundation
tags: [linked-list, two-pointers]
languages: [python, go, javascript, cpp, rust]
description: |
  Given the `head` of a linked list, remove the `n`th node from the end of the
  list and return its head.
examples:
  - input: "head = [1,2,3,4,5], n = 2"
    output: "[1,2,3,5]"
  - input: "head = [1], n = 1"
    output: "[]"
constraints:
  - "The number of nodes is sz"
  - "1 <= sz <= 30"
  - "0 <= Node.val <= 100"
  - "1 <= n <= sz"
time_limit_seconds: 30
hints:
  - "Use two pointers separated by n nodes."
  - "When the fast pointer reaches the end, the slow pointer is just before the target."
