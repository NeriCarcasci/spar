tests:
  - input: { head: [1, 2, 3, 4, 5], n: 2 }
    expected: [1, 2, 3, 5]
    visible: true
  - input: { head: [1], n: 1 }
    expected: []
    visible: true
  - input: { head: [1, 2], n: 1 }
    expected: [1]
    visible: false
  - input: { head: [1, 2], n: 2 }
    expected: [2]
    visible: false
  - input: { head: [1, 2, 3], n: 3 }
    expected: [2, 3]
    visible: false
