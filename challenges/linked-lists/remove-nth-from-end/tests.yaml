visible:
  - input: {list: [1,2,3,4,5], n: 2}
    expected: [1,2,3,5]
  - input: {list: [1], n: 1}
    expected: []
  - input: {list: [1,2], n: 1}
    expected: [1]
hidden:
  - input: {list: [1,2], n: 2}
    expected: [2]
  - input: {list: [1,2,3], n: 3}
    expected: [2,3]
  - input: {list: [1,2,3,4,5], n: 5}
    expected: [2,3,4,5]
