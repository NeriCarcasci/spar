visible:
  - input: [[1,2,4], [1,3,4]]
    expected: [1,1,2,3,4,4]
  - input: [[], []]
    expected: []
  - input: [[], [0]]
    expected: [0]
hidden:
  - input: [[1], [2]]
    expected: [1,2]
  - input: [[1,3,5], [2,4,6]]
    expected: [1,2,3,4,5,6]
  - input: [[5], [1,2,3]]
    expected: [1,2,3,5]
