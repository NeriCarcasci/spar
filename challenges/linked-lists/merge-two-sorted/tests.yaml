tests:
  - input: { list1: [1, 2, 4], list2: [1, 3, 4] }
    expected: [1, 1, 2, 3, 4, 4]
    visible: true
  - input: { list1: [], list2: [] }
    expected: []
    visible: true
  - input: { list1: [], list2: [0] }
    expected: [0]
    visible: false
  - input: { list1: [1], list2: [2] }
    expected: [1, 2]
    visible: false
  - input: { list1: [5, 10, 15], list2: [1, 2, 20] }
    expected: [1, 2, 5, 10, 15, 20]
    visible: false
