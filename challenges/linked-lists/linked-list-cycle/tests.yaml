visible:
  - input: {list: [3,2,0,-4], pos: 1}
    expected: true
  - input: {list: [1,2], pos: 0}
    expected: true
  - input: {list: [1], pos: -1}
    expected: false
hidden:
  - input: {list: [], pos: -1}
    expected: false
  - input: {list: [1,2,3,4], pos: -1}
    expected: false
  - input: {list: [1,2,3,4], pos: 2}
    expected: true
