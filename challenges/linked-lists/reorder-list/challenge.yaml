id: reorder-list
title: Reorder List
collection: the-foundation
category: linked-lists
difficulty: medium
languages: [python, go, javascript, cpp, rust]
description: |
  You are given the head of a singly linked-list: L0 → L1 → … → Ln-1 → Ln.
  Reorder it to: L0 → Ln → L1 → Ln-1 → L2 → Ln-2 → …
  You may not modify the values in the list's nodes. Only nodes themselves may be changed.
constraints: |
  - The number of nodes in the list is in the range [1, 5 * 10^4].
  - 1 <= Node.val <= 1000
hints:
  - Find the middle, reverse the second half, then merge the two halves.
  - Use slow/fast pointers to find the middle.
