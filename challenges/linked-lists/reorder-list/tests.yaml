tests:
  - input: { head: [1, 2, 3, 4] }
    expected: [1, 4, 2, 3]
    visible: true
  - input: { head: [1, 2, 3, 4, 5] }
    expected: [1, 5, 2, 4, 3]
    visible: true
  - input: { head: [1] }
    expected: [1]
    visible: false
  - input: { head: [1, 2] }
    expected: [1, 2]
    visible: false
  - input: { head: [1, 2, 3] }
    expected: [1, 3, 2]
    visible: false
