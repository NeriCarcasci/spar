tests:
  - input:
      points: [[1,3],[-2,2]]
      k: 1
    expected: [[-2,2]]
    visible: true

  - input:
      points: [[3,3],[5,-1],[-2,4]]
      k: 2
    expected: [[-2,4],[3,3]]
    visible: true

  - input:
      points: [[0,0]]
      k: 1
    expected: [[0,0]]
    visible: false

  - input:
      points: [[1,1],[-1,-1],[2,2]]
      k: 2
    expected: [[-1,-1],[1,1]]
    visible: false

  - input:
      points: [[1,0],[0,1],[-1,0],[0,-1]]
      k: 4
    expected: [[-1,0],[0,-1],[0,1],[1,0]]
    visible: false

  - input:
      points: [[10,10],[5,5],[1,1],[3,3]]
      k: 3
    expected: [[1,1],[3,3],[5,5]]
    visible: false

  - input:
      points: [[2,3],[4,0],[0,4]]
      k: 2
    expected: [[2,3],[0,4]]
    visible: false
