tests:
  - input:
      k: 3
      nums: [4, 5, 8, 2]
      operations: ["add", "add", "add", "add", "add"]
      values: [3, 5, 10, 9, 4]
    expected: [4, 5, 5, 8, 8]
    visible: true

  - input:
      k: 1
      nums: []
      operations: ["add", "add", "add"]
      values: [1, 2, 3]
    expected: [1, 2, 3]
    visible: true

  - input:
      k: 2
      nums: [0]
      operations: ["add", "add", "add"]
      values: [-1, 1, -2]
    expected: [-1, 0, 0]
    visible: false

  - input:
      k: 1
      nums: [5]
      operations: ["add", "add"]
      values: [3, 7]
    expected: [5, 7]
    visible: false

  - input:
      k: 3
      nums: [1, 1, 1]
      operations: ["add", "add"]
      values: [1, 1]
    expected: [1, 1]
    visible: false

  - input:
      k: 4
      nums: [7, 7, 7, 7, 8, 3]
      operations: ["add", "add"]
      values: [2, 10]
    expected: [7, 7]
    visible: false
